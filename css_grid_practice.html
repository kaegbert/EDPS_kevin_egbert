    <style>

            grid-template-rows: repeat(5, 1fr);
        }

        .item-1 {
            background-color: red;
            grid-area:1/1/2/13;
            
        }

            background-color: green;
            grid-area: 2/1/4/5;
        }

        .item-3 {
            background-color: yellow;
            grid-area: 2/5/4/13;
        }

        .item-4 {
            background-color: blue;
             grid-area: 4/1/6/3;

        }
        .item-5 {
            background-color: purple;
            grid-area: 4/3/6/13;


        }

        .container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
        }

        .sidebar{
            background-color: red;
            grid-area:1/1/12/2;
            
        }

        .main{
            background-color: green;
            grid-area: 1/2/12/13;
        }

        }

            background-color: purple;
            /* grid-area: 5/3/6/13; */


        }
    </style>
</head>
<body>

<br>
